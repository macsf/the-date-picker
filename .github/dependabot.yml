version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "semiannually"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 2
    allow:
      - dependency-name: "date-holidays"
    commit-message:
      prefix: "deps"

