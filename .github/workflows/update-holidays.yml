name: Update Thai Holidays Data

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate holiday data
        run: node scripts/gen-holidays.js

      - name: Create pull request if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-th-holidays
          title: "chore: update Thai holiday data"
          commit-message: "chore: update Thai holiday data"
          body: |
            Automated update for Thai holiday data generated by `scripts/gen-holidays.js`.

            Triggered by scheduled workflow.
          labels: |
            automation
            dependencies
          add-paths: |
            src/data/th-holidays.json
